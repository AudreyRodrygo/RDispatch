services:
  nats:
    image: nats:2.10-alpine
    container_name: rdispatch-nats
    command: ["--jetstream", "--store_dir=/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: rdispatch-postgres
    environment:
      POSTGRES_USER: rdispatch
      POSTGRES_PASSWORD: rdispatch
      POSTGRES_DB: rdispatch
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rdispatch"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
