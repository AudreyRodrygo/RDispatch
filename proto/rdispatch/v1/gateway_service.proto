syntax = "proto3";

package rdispatch.v1;

option go_package = "rdispatch/v1";

import "rdispatch/v1/notification.proto";

// GatewayService accepts notifications for delivery.
service GatewayService {
  // Send queues a single notification for delivery.
  rpc Send(SendRequest) returns (SendResponse);

  // SendBatch queues multiple notifications.
  rpc SendBatch(SendBatchRequest) returns (SendBatchResponse);
}

message SendRequest {
  Notification notification = 1;
}

message SendResponse {
  string notification_id = 1;
  bool accepted = 2;
  string rejection_reason = 3;
}

message SendBatchRequest {
  repeated Notification notifications = 1;
}

message SendBatchResponse {
  uint32 accepted = 1;
  uint32 rejected = 2;
  repeated string notification_ids = 3;
}
